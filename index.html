<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Semester Planner — Summer 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px;max-width:1000px;margin:0 auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #10b98144}50%{box-shadow:0 0 20px #10b98166}}
::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-track{background:#12121a;border-radius:3px}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:#2a2a3a #12121a}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.badge{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.nav button{background:none;border:1px solid #2a2a3a;color:#888;padding:6px 14px;border-radius:6px;font-size:12px}
.nav .today-btn{background:#22c55e;border:none;color:#000;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700}
.day-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.day-hdr span{text-align:center;font-size:10px;font-weight:600;color:#555;padding:4px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:24px}
.cell{background:#12121a;border-radius:8px;padding:6px 5px;min-height:90px;border:1px solid #1a1a28;transition:opacity .15s}
.cell.today{background:#0f1a14;border-color:#22c55e44}
.cell.outside{opacity:.25}
.cell.past{opacity:.35}
.cell.past-active{opacity:.6}
.date-num{text-align:center;margin-bottom:4px}
.date-num span{font-size:13px;font-weight:700;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#555}
.cell.today .date-num span{background:#22c55e;color:#000}
.items{display:flex;flex-direction:column;gap:2px}
.class-pill{background:#1a1a28;border-radius:4px;padding:3px 5px;border-left:2px solid;font-size:8px;font-weight:700}
.dl-pill{border-radius:4px;padding:2px 4px;display:flex;align-items:center;gap:3px;border-left:2px solid;font-size:7px;font-weight:600;cursor:pointer}
.dl-pill.done{opacity:.5}
.dl-pill .check{flex-shrink:0;width:12px;height:12px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.work-pill{background:#1a1428;border-radius:4px;padding:3px 5px;border-left:2px solid #a855f7}
.wk-pill{border-radius:4px;padding:2px 4px;display:flex;align-items:center;gap:3px;font-size:7px;font-weight:600}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filters button{padding:6px 14px;border-radius:6px;border:1px solid #2a2a3a;font-size:11px;font-weight:600;background:#1a1a2e;color:#666}
.filters button.active{color:#000}
.dl-list{display:flex;flex-direction:column;gap:5px}
.dl-row{border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid}
.dl-row .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.dl-row .check-btn{width:24px;height:24px;border-radius:6px;border:2px solid;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.dl-row .icon{font-size:16px;flex-shrink:0}
.dl-row .title{font-size:13px;font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dl-row .date-info{font-size:11px;color:#666;font-family:'JetBrains Mono',monospace}
.dl-row .course-tag{font-size:11px;font-weight:600}
.dl-row .days-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.section-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:12px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.wk-card{background:#12121a;border-radius:10px;padding:14px 16px;border-top:3px solid;cursor:pointer;transition:all .15s}
.wk-card .exercises{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.wk-card .ex-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#0a0a0f;border-radius:6px}
.class-card{flex:1;min-width:140px;background:#12121a;border-radius:10px;padding:14px 16px;border-top:3px solid}
.banner{background:linear-gradient(135deg,#12121a,#16162a);border:1px solid #1e1e2e;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.banner-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.banner-card{border-left:3px solid;border-radius:8px;padding:10px 12px;min-width:150px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.export-bar button{padding:6px 12px;border-radius:6px;border:1px solid #2a2a3a;background:#1a1a2e;color:#888;font-size:11px;font-weight:600}
.export-bar textarea{flex:1;min-width:200px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:6px;color:#888;font-size:10px;font-family:'JetBrains Mono',monospace;padding:6px;resize:none;height:32px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const CLASSES = [
  { day: 2, name: "CYBR 442", subtitle: "Cyber Operations", time: "6:00–9:50 PM", color: "#e74c3c", instructor: "Prof. Hepp", tag: "Hybrid" },
  { day: 3, name: "CYBR 499", subtitle: "Capstone II", time: "6:00–9:50 PM", color: "#3498db", instructor: "Prof. Tandon", tag: "Zoom" },
  { day: 4, name: "CYBR 445", subtitle: "Incident Response", time: "6:00–9:50 PM", color: "#f39c12", instructor: "Prof. Hepp", tag: "Online" },
];
const IN_PERSON = ["2026-05-19", "2026-06-30", "2026-08-11"];
const WORK_SHIFTS = [];
const DEADLINES = [
  { id: "c442-whoami", date: "2026-05-26", title: "Who Am I? Video", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-ethics-agree", date: "2026-05-26", title: "Ethics Agreement", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-career", date: "2026-05-26", title: "Career Exercise", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-namecoach", date: "2026-05-26", title: "Name Coach", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-bco-paper", date: "2026-06-02", title: "Basic Cyber Operations Paper", course: "CYBR 442", color: "#e74c3c", type: "paper" },
  { id: "c442-bco-disc", date: "2026-06-02", title: "BCO Discussion Post", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-ethics-paper", date: "2026-06-09", title: "Ethics Paper", course: "CYBR 442", color: "#e74c3c", type: "paper" },
  { id: "c442-vid-proposal", date: "2026-06-09", title: "Individual Video Proposal", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-sched-exam", date: "2026-06-09", title: "Schedule Cloud+ Cert Exam", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-group-prop", date: "2026-06-16", title: "Group Project Proposal", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-ch3-labs", date: "2026-06-23", title: "Chapter 3 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch4-labs", date: "2026-06-30", title: "Chapter 4 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch5-labs", date: "2026-07-07", title: "Chapter 5 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch6-labs", date: "2026-07-07", title: "Chapter 6 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ind-video", date: "2026-07-07", title: "Individual Video (15+ min)", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-ch7-labs", date: "2026-07-14", title: "Chapter 7 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch8-labs", date: "2026-07-21", title: "Chapter 8 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch9-labs", date: "2026-07-28", title: "Chapter 9 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch10-labs", date: "2026-08-04", title: "Chapter 10 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-cyber-range", date: "2026-08-04", title: "Cyber Range Assignment", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-rec-lecture", date: "2026-08-04", title: "Watch Recorded Lecture (2x)", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-ch11-labs", date: "2026-08-11", title: "Chapter 11 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-ch12-labs", date: "2026-08-11", title: "Chapter 12 Labs (Cloud+)", course: "CYBR 442", color: "#e74c3c", type: "lab" },
  { id: "c442-feedback", date: "2026-08-11", title: "Course Feedback Discussion", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-group-paper", date: "2026-08-11", title: "Group Project Paper", course: "CYBR 442", color: "#e74c3c", type: "paper" },
  { id: "c442-group-peer", date: "2026-08-11", title: "Group Peer Evals + AI Attestation", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-group-slides", date: "2026-08-11", title: "Group Project Slide Deck", course: "CYBR 442", color: "#e74c3c", type: "assignment" },
  { id: "c442-cloudplus", date: "2026-08-14", title: "CompTIA Cloud+ Exam (CV0-004)", course: "CYBR 442", color: "#10b981", type: "exam" },
  { id: "c499-pr1", date: "2026-06-03", title: "Progress Report #1 (50 pts)", course: "CYBR 499", color: "#3498db", type: "paper" },
  { id: "c499-pr2", date: "2026-06-17", title: "Progress Report #2 (50 pts)", course: "CYBR 499", color: "#3498db", type: "paper" },
  { id: "c499-pr3", date: "2026-07-01", title: "Progress Report #3 (50 pts)", course: "CYBR 499", color: "#3498db", type: "paper" },
  { id: "c499-draft", date: "2026-07-15", title: "Draft Thesis + Discussion (300 pts)", course: "CYBR 499", color: "#3498db", type: "paper" },
  { id: "c499-final", date: "2026-07-29", title: "Final Thesis (400 pts)", course: "CYBR 499", color: "#3498db", type: "paper" },
  { id: "c499-defense", date: "2026-08-05", title: "Oral Defense PowerPoint", course: "CYBR 499", color: "#3498db", type: "assignment" },
];
const WORKOUTS = [
  { name: "Push", emoji: "💪", color: "#ef4444", exercises: ["Push-ups — 3×15", "Diamond push-ups — 3×10", "DB shoulder press — 3×12", "DB chest fly — 3×12", "Pike push-ups — 3×8", "Tricep dips (chair) — 3×12"] },
  { name: "Pull", emoji: "🏋️", color: "#8b5cf6", exercises: ["Pull-ups — 3× max", "Chin-ups — 3× max", "DB bent-over rows — 3×12", "DB bicep curls — 3×12", "DB hammer curls — 3×10", "Dead hangs — 3×30s"] },
  { name: "Legs", emoji: "🦵", color: "#f59e0b", exercises: ["DB goblet squats — 3×15", "Bulgarian split squats — 3×10/leg", "Walking lunges — 3×12/leg", "DB Romanian deadlifts — 3×12", "Calf raises — 3×20", "Wall sit — 3×45s"] },
  { name: "Core", emoji: "🔥", color: "#10b981", exercises: ["Plank — 3×60s", "Mountain climbers — 3×30s", "Bicycle crunches — 3×20", "Leg raises — 3×15", "DB Russian twists — 3×20", "Burpees — 3×10"] },
];

const SEM_START = "2026-05-19", SEM_END = "2026-08-14";
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAY_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MON_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const ICONS = { lab:"🧪", quiz:"📋", exam:"🔴", paper:"📝", assignment:"📄" };

// ── STATE ──
let curMonth, curYear, done, wkDays, filter, showDone, expandedWk;
const today = new Date();
const todayStr = fmt(today);

function init() {
  curMonth = today.getMonth();
  curYear = today.getFullYear();
  done = JSON.parse(localStorage.getItem("sp-done") || "{}");
  wkDays = JSON.parse(localStorage.getItem("sp-wkdays") || "[1,2,5,6]");
  filter = "all";
  showDone = false;
  expandedWk = null;
  render();
}

function fmt(d) { return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function daysB(a,b) { return Math.ceil((new Date(a+"T00:00:00")-new Date(b+"T00:00:00"))/86400000); }

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function toggleDone(id) {
  if (done[id]) delete done[id]; else done[id] = true;
  localStorage.setItem("sp-done", JSON.stringify(done));
  render();
}

function getWorkout(dow) {
  const sorted = [...wkDays].sort((a,b)=>a-b);
  const idx = sorted.indexOf(dow);
  return idx === -1 ? null : WORKOUTS[idx % WORKOUTS.length];
}

function exportProgress() {
  const code = btoa(JSON.stringify({ done, wkDays, ts: new Date().toISOString() }));
  navigator.clipboard.writeText(code).then(() => toast("Copied! Paste this to Claude."));
}

function importProgress() {
  const ta = document.getElementById("import-ta");
  if (!ta || !ta.value.trim()) return;
  try {
    const data = JSON.parse(atob(ta.value.trim()));
    if (data.done) { done = data.done; localStorage.setItem("sp-done", JSON.stringify(done)); }
    if (data.wkDays) { wkDays = data.wkDays; localStorage.setItem("sp-wkdays", JSON.stringify(wkDays)); }
    ta.value = "";
    toast("Progress imported!");
    render();
  } catch (e) { toast("Invalid code — try again"); }
}

function getMonthCells() {
  const first = new Date(curYear, curMonth, 1);
  const startDow = first.getDay();
  const dim = new Date(curYear, curMonth+1, 0).getDate();
  const cells = [];
  for (let i=0; i<startDow; i++) { const d = new Date(curYear, curMonth, 1-(startDow-i)); cells.push({date:d, str:fmt(d), dow:d.getDay(), out:true}); }
  for (let i=1; i<=dim; i++) { const d = new Date(curYear, curMonth, i); cells.push({date:d, str:fmt(d), dow:d.getDay(), out:false}); }
  const rem = 7 - (cells.length % 7);
  if (rem < 7) for (let i=1; i<=rem; i++) { const d = new Date(curYear, curMonth+1, i); cells.push({date:d, str:fmt(d), dow:d.getDay(), out:true}); }
  return cells;
}

// ── RENDER ──
function render() {
  const upcoming = DEADLINES.filter(d => !done[d.id] && daysB(d.date, todayStr) >= 0).filter(d => filter==="all" || d.course===filter).sort((a,b)=>a.date.localeCompare(b.date));
  const urgCount = upcoming.filter(d => daysB(d.date, todayStr) <= 7).length;
  const doneCount = Object.keys(done).filter(k=>done[k]).length;
  const cells = getMonthCells();

  let h = '';

  // Header
  h += `<div class="hdr"><div>`;
  h += `<h1 style="font-size:26px;font-weight:700;color:#fff">Semester Planner</h1>`;
  h += `<div style="display:flex;align-items:center;gap:8px;margin-top:2px">`;
  h += `<span class="mono" style="font-size:13px;color:#666">Summer 2026 · Metro State</span>`;
  h += `<span class="mono" style="font-size:10px;font-weight:700;color:#10b981;background:rgba(16,185,129,.12);padding:3px 8px;border-radius:4px">FINAL SEMESTER 🎓</span>`;
  h += `</div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">`;
  if (doneCount > 0) h += `<span class="badge" style="color:#22c55e;background:rgba(34,197,94,.1)">${doneCount} done ✓</span>`;
  if (urgCount > 0) h += `<span class="badge" style="color:#ef4444;background:rgba(239,68,68,.1);animation:pulse 1.5s infinite">${urgCount} due this week</span>`;
  h += `</div></div>`;

  // Export/Import bar
  h += `<div class="export-bar">`;
  h += `<button onclick="exportProgress()">📤 Export Progress</button>`;
  h += `<textarea id="import-ta" placeholder="Paste import code here..."></textarea>`;
  h += `<button onclick="importProgress()">📥 Import</button>`;
  h += `</div>`;

  // Banner
  h += `<div class="banner"><div style="display:flex;justify-content:space-between;margin-bottom:10px">`;
  h += `<span class="mono" style="font-size:10px;font-weight:700;color:#555;letter-spacing:1.5px">${upcoming.length > 0 ? "UPCOMING DEADLINES" : "SEMESTER STATUS"}</span>`;
  h += `<span class="mono" style="font-size:10px;font-weight:700;color:#3a5a3a;letter-spacing:1.5px">STANDALONE DASHBOARD</span></div>`;
  if (upcoming.length === 0) {
    h += `<div style="text-align:center;padding:16px 0"><p style="font-size:28px">🎉</p><p style="color:#22c55e;font-size:15px;font-weight:600;margin-top:8px">All caught up!</p></div>`;
  } else {
    h += `<div class="banner-scroll">`;
    upcoming.slice(0,6).forEach(d => {
      const days = daysB(d.date, todayStr), urg = days <= 3, isExam = d.type==="exam";
      h += `<div class="banner-card" style="border-color:${d.color};background:${isExam?"#0a1a14":urg?"#1a1018":"#1a1a28"}${isExam?";animation:glow 2s infinite":""}">`;
      h += `<div style="display:flex;justify-content:space-between"><span style="font-size:12px">${isExam?"🏆":ICONS[d.type]||"📌"}</span>`;
      h += `<span class="mono" style="font-size:12px;font-weight:700;color:${urg?"#ef4444":"#22c55e"}${urg?";animation:pulse 1.5s infinite":""}">${days===0?"TODAY":days+"d"}</span></div>`;
      h += `<span style="font-size:12px;color:${isExam?"#10b981":"#ddd"};font-weight:${isExam?700:500}">${d.title}</span>`;
      h += `<span style="font-size:10px;color:${d.color};font-weight:600">${d.course}</span></div>`;
    });
    h += `</div>`;
  }
  h += `</div>`;

  // Month nav
  h += `<div class="nav">`;
  h += `<button onclick="curMonth===0?(curMonth=11,curYear--):curMonth--;render()">← Prev</button>`;
  h += `<div style="display:flex;align-items:center;gap:10px"><span style="font-size:15px;font-weight:600;color:#ccc">${MON_FULL[curMonth]} ${curYear}</span>`;
  if (curMonth !== today.getMonth() || curYear !== today.getFullYear()) h += `<button class="today-btn" onclick="curMonth=${today.getMonth()};curYear=${today.getFullYear()};render()">Today</button>`;
  h += `</div><button onclick="curMonth===11?(curMonth=0,curYear++):curMonth++;render()">Next →</button></div>`;

  // Day headers
  h += `<div class="day-hdr">${DAY_NAMES.map(d=>`<span>${d}</span>`).join("")}</div>`;

  // Month grid
  h += `<div class="month-grid">`;
  cells.forEach(({date, str, dow, out}) => {
    const isToday = str === todayStr;
    const inSem = str >= SEM_START && str <= SEM_END;
    const cls = inSem ? CLASSES.filter(c => c.day === dow) : [];
    const dls = DEADLINES.filter(d => d.date === str);
    const shifts = WORK_SHIFTS.filter(s => s.date === str);
    const wk = shifts.length === 0 ? getWorkout(dow) : null;
    const past = str < todayStr;
    const isIP = IN_PERSON.includes(str);
    let cellClass = "cell";
    if (isToday) cellClass += " today";
    if (out) cellClass += " outside";
    else if (past && !dls.some(d => !done[d.id])) cellClass += " past";
    else if (past) cellClass += " past-active";

    h += `<div class="${cellClass}"><div class="date-num"><span>${date.getDate()}</span></div><div class="items">`;

    shifts.forEach(s => {
      h += `<div class="work-pill"><span style="font-size:8px;font-weight:700;color:#a855f7">${s.role==="Floor Manager"?"FM":"Bar"}</span><span class="mono" style="font-size:7px;color:#999;display:block">${s.start}–${s.end}</span></div>`;
    });

    cls.forEach(c => {
      const irl = isIP && c.name === "CYBR 442";
      h += `<div class="class-pill" style="border-color:${c.color}"><div style="display:flex;justify-content:space-between;align-items:center"><span style="color:${c.color}">${c.name}</span>`;
      if (irl) h += `<span style="font-size:6px;background:#ef444422;color:#fbbf24;padding:0 3px;border-radius:2px;font-weight:700">IRL</span>`;
      h += `</div></div>`;
    });

    dls.forEach(d => {
      const isDone = done[d.id], isExam = d.type === "exam";
      h += `<div class="dl-pill${isDone?" done":""}" style="border-color:${isDone?"#333":d.color};background:${isExam?"#0a1a14":isDone?"#111118":"#1e1418"}" ${!isExam?`onclick="toggleDone('${d.id}')"`:""}>`;
      if (!isExam) h += `<span class="check" style="${isDone?"background:#22c55e;color:#000":"border:1.5px solid "+d.color+"44"}">${isDone?"✓":""}</span>`;
      if (isExam) h += `<span style="font-size:10px">🏆</span>`;
      h += `<span style="color:${isExam?"#10b981":isDone?"#555":"#f87171"};${isDone?"text-decoration:line-through;":""}overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.title}</span></div>`;
    });

    if (wk && !out) {
      h += `<div class="wk-pill" style="background:${wk.color}10;border:1px solid ${wk.color}22"><span style="font-size:9px">${wk.emoji}</span><span style="color:${wk.color}">${wk.name}</span></div>`;
    }

    h += `</div></div>`;
  });
  h += `</div>`;

  // Filters
  h += `<div class="filters">`;
  ["all","CYBR 442","CYBR 499","CYBR 445"].forEach(c => {
    const active = filter === c;
    const col = c==="all"?"#fff":CLASSES.find(cl=>cl.name===c)?.color||"#fff";
    h += `<button style="${active?`background:${col};color:#000`:""}" ${active?'class="active"':""} onclick="filter='${c}';render()">${c==="all"?"All Courses":c}</button>`;
  });
  if (doneCount > 0) h += `<button style="margin-left:auto;${showDone?"background:#22c55e;color:#000":""}" onclick="showDone=!showDone;render()">${showDone?"Hide":"Show"} completed (${doneCount})</button>`;
  h += `</div>`;

  // Remaining deadlines
  h += `<div style="margin-bottom:24px"><h3 class="section-title">Remaining Deadlines (${upcoming.length})</h3>`;
  if (upcoming.length === 0) {
    h += `<div style="background:#12121a;border-radius:10px;padding:24px;text-align:center"><p style="font-size:28px">🎉</p><p style="color:#22c55e;font-size:15px;font-weight:600;margin-top:8px">All caught up!</p></div>`;
  } else {
    h += `<div class="dl-list">`;
    upcoming.forEach(d => {
      const days = daysB(d.date, todayStr), dateObj = new Date(d.date+"T00:00:00"), urg = days<=3, tw = days<=7, isExam = d.type==="exam";
      h += `<div class="dl-row" style="border-color:${d.color};background:${isExam?"#0a1a14":urg?"#1a1018":"#12121a"}${isExam?";animation:glow 2s infinite":""}">`;
      h += `<div class="left">`;
      if (!isExam) h += `<button class="check-btn" style="border-color:${d.color}55" onclick="toggleDone('${d.id}')"> </button>`;
      h += `<span class="icon">${isExam?"🏆":ICONS[d.type]||"📌"}</span><div style="min-width:0">`;
      h += `<span class="title" style="color:${isExam?"#10b981":"#ddd"};font-weight:${isExam?700:500}">${d.title}</span>`;
      h += `<span class="date-info">${DAY_FULL[dateObj.getDay()]}, ${MON[dateObj.getMonth()]} ${dateObj.getDate()}</span></div></div>`;
      h += `<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">`;
      h += `<span class="course-tag" style="color:${d.color}">${d.course}</span>`;
      h += `<span class="days-badge" style="color:${urg?"#ef4444":tw?"#fbbf24":"#22c55e"};background:${urg?"rgba(239,68,68,.1)":tw?"rgba(251,191,36,.08)":"rgba(34,197,94,.08)"}">${days===0?"TODAY":days+"d"}</span>`;
      h += `</div></div>`;
    });
    h += `</div>`;
  }
  h += `</div>`;

  // Completed
  if (showDone && doneCount > 0) {
    const completed = DEADLINES.filter(d => done[d.id]).filter(d => filter==="all" || d.course===filter);
    h += `<div style="margin-bottom:24px"><h3 class="section-title">Completed (${completed.length})</h3><div class="dl-list">`;
    completed.forEach(d => {
      h += `<div class="dl-row" style="border-color:#333;background:#0e0e14;opacity:.6"><div class="left">`;
      h += `<button class="check-btn" style="border:none;background:#22c55e;color:#000;font-weight:700;font-size:13px" onclick="toggleDone('${d.id}')">✓</button>`;
      h += `<div><span style="font-size:13px;color:#555;text-decoration:line-through">${d.title}</span><span style="font-size:11px;color:#444;display:block">${d.course}</span></div></div>`;
      h += `<span style="font-size:11px;color:#333;font-style:italic">undo</span></div>`;
    });
    h += `</div></div>`;
  }

  // Workout plan
  h += `<div style="margin-bottom:24px"><h3 class="section-title">Home Workout Plan</h3>`;
  h += `<p style="font-size:11px;color:#555;margin-bottom:10px">Equipment: yoga mat · pull-up bar · 2×15 lb dumbbells</p>`;
  h += `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">`;
  WORKOUTS.forEach((wk, i) => {
    const isOpen = expandedWk === i;
    const assigned = [...wkDays].sort((a,b)=>a-b).filter((_,idx)=>idx%WORKOUTS.length===i).map(d=>DAY_NAMES[d]);
    h += `<div class="wk-card" style="border-color:${wk.color}" onclick="expandedWk=expandedWk===${i}?null:${i};render()">`;
    h += `<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px">`;
    h += `<span style="font-size:18px">${wk.emoji}</span><div><span style="font-size:15px;font-weight:700;color:${wk.color};display:block">${wk.name} Day</span>`;
    if (assigned.length) h += `<span class="mono" style="font-size:10px;color:#555">${assigned.join(", ")}</span>`;
    h += `</div></div><span style="font-size:14px;color:#555">${isOpen?"▲":"▼"}</span></div>`;
    if (isOpen) {
      h += `<div class="exercises">`;
      wk.exercises.forEach((ex, j) => {
        h += `<div class="ex-row"><span class="mono" style="font-size:10px;color:${wk.color};font-weight:700;min-width:16px">${j+1}</span><span style="font-size:12px;color:#ccc">${ex}</span></div>`;
      });
      h += `</div>`;
    }
    h += `</div>`;
  });
  h += `</div></div>`;

  // Classes + Work
  h += `<div style="margin-bottom:20px"><h3 class="section-title">Weekly Classes + Work</h3>`;
  h += `<div style="display:flex;gap:10px;flex-wrap:wrap">`;
  CLASSES.forEach(c => {
    h += `<div class="class-card" style="border-color:${c.color}"><span style="font-size:16px;font-weight:700;color:${c.color};display:block">${c.name}</span>`;
    h += `<span style="font-size:12px;color:#888">${c.subtitle}</span>`;
    h += `<span class="mono" style="font-size:11px;color:#666;display:block;margin-top:6px">${DAY_FULL[c.day]}s · ${c.time}</span>`;
    h += `<span style="font-size:11px;color:#555">${c.instructor}</span>`;
    if (c.name==="CYBR 442") h += `<span style="font-size:9px;color:#fbbf24;display:block;margin-top:4px">📍 In person: 5/19, 6/30, 8/11</span>`;
    h += `</div>`;
  });
  h += `<div class="class-card" style="border-color:#a855f7"><span style="font-size:16px;font-weight:700;color:#a855f7;display:block">CP Maplewood</span>`;
  h += `<span style="font-size:12px;color:#888">Floor Mgr / Bartender</span>`;
  h += `<span class="mono" style="font-size:11px;color:#666;display:block;margin-top:6px">Varies · see R365</span></div></div>`;
  h += `<div style="margin-top:10px;background:#12121a;border-radius:10px;padding:12px 16px;border-left:3px solid #555">`;
  h += `<div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">🎓</span><div>`;
  h += `<span style="font-size:13px;font-weight:600;color:#888">WKSP GRAD — Graduation Requirements</span>`;
  h += `<span style="font-size:11px;color:#555;display:block">Async · Hauser, Vicki · May 16 – Aug 14</span></div></div></div></div>`;

  h += `<p style="text-align:center;font-size:12px;color:#333;font-style:italic">📅 Summer 2026 · CYBR 442 + 499 syllabi loaded · Standalone Dashboard v1</p>`;

  document.body.innerHTML = `<div class="toast" id="toast"></div>` + h;
}

init();
</script>
</body>
</html>
