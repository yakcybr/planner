<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px;max-width:1000px;margin:0 auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #10b98144}50%{box-shadow:0 0 20px #10b98166}}
::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-track{background:#12121a;border-radius:3px}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:#2a2a3a #12121a}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.badge{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.nav button{background:none;border:1px solid #2a2a3a;color:#888;padding:6px 14px;border-radius:6px;font-size:12px}
.nav .today-btn{background:#22c55e;border:none;color:#000;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700}
.day-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.day-hdr span{text-align:center;font-size:10px;font-weight:600;color:#555;padding:4px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:24px}
.cell{background:#12121a;border-radius:8px;padding:6px 5px;min-height:90px;border:1px solid #1a1a28}
.cell.today{background:#0f1a14;border-color:#22c55e44}
.cell.outside{opacity:.25}.cell.past{opacity:.35}.cell.past-active{opacity:.6}
.date-num{text-align:center;margin-bottom:4px}
.date-num span{font-size:13px;font-weight:700;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#555}
.cell.today .date-num span{background:#22c55e;color:#000}
.items{display:flex;flex-direction:column;gap:2px}
.cp{background:#1a1a28;border-radius:4px;padding:3px 5px;border-left:2px solid;font-size:8px;font-weight:700}
.dp{border-radius:4px;padding:2px 4px;display:flex;align-items:center;gap:3px;border-left:2px solid;font-size:7px;font-weight:600;cursor:pointer}
.dp.done{opacity:.5}
.dp .ck{flex-shrink:0;width:12px;height:12px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.wp{background:#1a1428;border-radius:4px;padding:3px 5px;border-left:2px solid #a855f7}
.wkp{border-radius:4px;padding:2px 4px;display:flex;align-items:center;gap:3px;font-size:7px;font-weight:600}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filters button{padding:6px 14px;border-radius:6px;border:1px solid #2a2a3a;font-size:11px;font-weight:600;background:#1a1a2e;color:#666}
.filters button.active{color:#000}
.dlst{display:flex;flex-direction:column;gap:5px}
.dr{border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid}
.dr .lt{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.dr .cb{width:24px;height:24px;border-radius:6px;border:2px solid;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.dr .ic{font-size:16px;flex-shrink:0}
.dr .tt{font-size:13px;font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dr .di{font-size:11px;color:#666;font-family:'JetBrains Mono',monospace}
.dr .ct{font-size:11px;font-weight:600}
.dr .db{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.st{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:12px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.wc{background:#12121a;border-radius:10px;padding:14px 16px;border-top:3px solid;cursor:pointer}
.wc .exs{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.wc .exr{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#0a0a0f;border-radius:6px}
.cc{flex:1;min-width:140px;background:#12121a;border-radius:10px;padding:14px 16px;border-top:3px solid}
.bn{background:linear-gradient(135deg,#12121a,#16162a);border:1px solid #1e1e2e;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.bs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.bc{border-left:3px solid;border-radius:8px;padding:10px 12px;min-width:150px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.eb{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.eb button{padding:6px 12px;border-radius:6px;border:1px solid #2a2a3a;background:#1a1a2e;color:#888;font-size:11px;font-weight:600}
.eb textarea{flex:1;min-width:200px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:6px;color:#888;font-size:10px;font-family:'JetBrains Mono',monospace;padding:6px;resize:none;height:32px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

@media(max-width:700px){
  body{padding:12px 8px}
  .hdr h1{font-size:20px}
  .month-grid{gap:2px}
  .cell{padding:4px 3px;min-height:60px;border-radius:6px}
  .date-num span{font-size:11px;width:20px;height:20px}
  .cp,.dp,.wp,.wkp{font-size:6px;padding:2px 3px}
  .dp .ck{width:10px;height:10px;font-size:6px}
  .bc{min-width:120px;padding:8px 10px}
  .dr{padding:10px;flex-wrap:wrap;gap:6px}
  .dr .tt{font-size:12px}.dr .ic{font-size:14px}.dr .cb{width:20px;height:20px}
  .dr .db{font-size:10px;padding:3px 8px}.dr .ct{font-size:9px}
  .filters{gap:4px}.filters button{padding:5px 10px;font-size:10px}
  .wc{padding:10px 12px}.wc .exr{padding:4px 6px}.wc .exr span{font-size:10px}
  .cc{min-width:100%;flex:unset}
  .eb{flex-direction:column}.eb textarea{min-width:unset;width:100%}
  .nav button{padding:4px 10px;font-size:11px}
  .day-hdr span{font-size:9px}
}
</style>
</head>

  {id:"c499-pr1",date:"2026-06-03",title:"Progress Report #1 (50 pts)",course:"CYBR 499",color:"#3498db",type:"paper"},

  {id:"c445-q1",date:"2026-05-28",title:"Quiz 1 + Module 1 Labs",course:"CYBR 445",color:"#f39c12",type:"quiz"},
  {id:"c445-fw",date:"2026-05-28",title:"First Week Assignments",course:"CYBR 445",color:"#f39c12",type:"assignment"},
  {id:"c445-q23",date:"2026-06-04",title:"Quiz 2 & 3 + Module 2 & 3 Labs",course:"CYBR 445",color:"#f39c12",type:"quiz"},

const WKS=[
  {name:"Push",emoji:"💪",color:"#ef4444",ex:["Push-ups — 3×15","Diamond push-ups — 3×10","DB shoulder press — 3×12","DB chest fly — 3×12","Pike push-ups — 3×8","Tricep dips (chair) — 3×12"]},
  {name:"Pull",emoji:"🏋️",color:"#8b5cf6",ex:["Pull-ups — 3× max","Chin-ups — 3× max","DB bent-over rows — 3×12","DB bicep curls — 3×12","DB hammer curls — 3×10","Dead hangs — 3×30s"]},
  {name:"Legs",emoji:"🦵",color:"#f59e0b",ex:["DB goblet squats — 3×15","Bulgarian split squats — 3×10/leg","Walking lunges — 3×12/leg","DB Romanian deadlifts — 3×12","Calf raises — 3×20","Wall sit — 3×45s"]},
  {name:"Core",emoji:"🔥",color:"#10b981",ex:["Plank — 3×60s","Mountain climbers — 3×30s","Bicycle crunches — 3×20","Leg raises — 3×15","DB Russian twists — 3×20","Burpees — 3×10"]},
];
const SS="2026-05-19",SE="2026-08-16";
const DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],DF=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],MF=["January","February","March","April","May","June","July","August","September","October","November","December"];
const IC={lab:"🧪",quiz:"📋",exam:"🔴",paper:"📝",assignment:"📄"};
const WC="#a855f7",MO="'JetBrains Mono',monospace";

let cM,cY,done,wkD,filt,shD,exW;
const td=new Date(),ts=fmt(td);

function init(){cM=td.getMonth();cY=td.getFullYear();done=JSON.parse(localStorage.getItem("sp-done")||'{"c442-ethics-agree":true,"c442-namecoach":true}');wkD=JSON.parse(localStorage.getItem("sp-wkdays")||"[1,2,5,6]");filt="all";shD=false;exW=null;render();}
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dB(a,b){return Math.ceil((new Date(a+"T00:00:00")-new Date(b+"T00:00:00"))/86400000);}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);}
function tgl(id){if(done[id])delete done[id];else done[id]=true;localStorage.setItem("sp-done",JSON.stringify(done));render();}
function gW(d){const s=[...wkD].sort((a,b)=>a-b);const i=s.indexOf(d);return i===-1?null:WKS[i%WKS.length];}
function expP(){const c=btoa(JSON.stringify({done,wkDays:wkD,ts:new Date().toISOString()}));navigator.clipboard.writeText(c).then(()=>toast("Copied! Paste to Claude or other device."));}
function impP(){const ta=document.getElementById("imp");if(!ta||!ta.value.trim())return;try{const d=JSON.parse(atob(ta.value.trim()));if(d.done){done=d.done;localStorage.setItem("sp-done",JSON.stringify(done));}if(d.wkDays){wkD=d.wkDays;localStorage.setItem("sp-wkdays",JSON.stringify(wkD));}ta.value="";toast("Progress imported!");render();}catch(e){toast("Invalid code");}}
function gCells(){const f=new Date(cY,cM,1),sd=f.getDay(),dm=new Date(cY,cM+1,0).getDate(),c=[];for(let i=0;i<sd;i++){const d=new Date(cY,cM,1-(sd-i));c.push({d,s:fmt(d),w:d.getDay(),o:true});}for(let i=1;i<=dm;i++){const d=new Date(cY,cM,i);c.push({d,s:fmt(d),w:d.getDay(),o:false});}const r=7-(c.length%7);if(r<7)for(let i=1;i<=r;i++){const d=new Date(cY,cM+1,i);c.push({d,s:fmt(d),w:d.getDay(),o:true});}return c;}
function pM(){if(cM===0){cM=11;cY--;}else cM--;render();}
function nM(){if(cM===11){cM=0;cY++;}else cM++;render();}
function goT(){cM=td.getMonth();cY=td.getFullYear();render();}

function render(){
const up=DL.filter(d=>!done[d.id]&&dB(d.date,ts)>=0).filter(d=>filt==="all"||d.course===filt).sort((a,b)=>a.date.localeCompare(b.date));
const uc=up.filter(d=>dB(d.date,ts)<=7).length;
const dc=Object.keys(done).filter(k=>done[k]).length;
const cells=gCells();
let h='';

// Header
h+=`<div class="hdr"><div><h1 style="font-size:26px;font-weight:700;color:#fff">Semester Planner</h1><div style="display:flex;align-items:center;gap:8px;margin-top:2px"><span class="mono" style="font-size:13px;color:#666">Summer 2026 · Metro State</span><span class="mono" style="font-size:10px;font-weight:700;color:#10b981;background:rgba(16,185,129,.12);padding:3px 8px;border-radius:4px">FINAL SEMESTER 🎓</span></div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">`;
if(dc>0)h+=`<span class="badge" style="color:#22c55e;background:rgba(34,197,94,.1)">${dc} done ✓</span>`;
if(uc>0)h+=`<span class="badge" style="color:#ef4444;background:rgba(239,68,68,.1);animation:pulse 1.5s infinite">${uc} due this week</span>`;
h+=`</div></div>`;

// Export/Import
h+=`<div class="eb"><button onclick="expP()">📤 Export Progress</button><textarea id="imp" placeholder="Paste import code here..."></textarea><button onclick="impP()">📥 Import</button></div>`;

// Banner
h+=`<div class="bn"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span class="mono" style="font-size:10px;font-weight:700;color:#555;letter-spacing:1.5px">${up.length?"UPCOMING DEADLINES":"ALL CAUGHT UP"}</span><span class="mono" style="font-size:10px;font-weight:700;color:#3a5a3a;letter-spacing:1.5px">ALL SYLLABI LOADED</span></div>`;
if(!up.length){h+=`<div style="text-align:center;padding:16px 0"><p style="font-size:28px">🎉</p><p style="color:#22c55e;font-size:15px;font-weight:600;margin-top:8px">All caught up!</p></div>`;}
else{h+=`<div class="bs">`;up.slice(0,6).forEach(d=>{const dy=dB(d.date,ts),u=dy<=3,ex=d.type==="exam";h+=`<div class="bc" style="border-color:${d.color};background:${ex?"#0a1a14":u?"#1a1018":"#1a1a28"}${ex?";animation:glow 2s infinite":""}"><div style="display:flex;justify-content:space-between"><span style="font-size:12px">${ex?"🏆":IC[d.type]||"📌"}</span><span class="mono" style="font-size:12px;font-weight:700;color:${u?"#ef4444":"#22c55e"}${u?";animation:pulse 1.5s infinite":""}">${dy===0?"TODAY":dy+"d"}</span></div><span style="font-size:12px;color:${ex?"#10b981":"#ddd"};font-weight:${ex?700:500}">${d.title}</span><span style="font-size:10px;color:${d.color};font-weight:600">${d.course}</span></div>`;});h+=`</div>`;}
h+=`</div>`;

if(op){h+=`<div class="exs">`;wk.ex.forEach((e,j)=>{h+=`<div class="exr"><span class="mono" style="font-size:10px;color:${wk.color};font-weight:700;min-width:16px">${j+1}</span><span style="font-size:12px;color:#ccc">${e}</span></div>`;});h+=`</div>`;}

h+=`</div>`;});
